[base]
name = python_template_example
files = {[base]name} tests docs/conf.py pyproject.toml README.md CHANGELOG.md

[tox]
envlist =
    check-packaging
    lint
    type-checking
    min_versions
    py{312,313,314}
    docs
skip_missing_interpreters = true

minversion = 4.20

[gh-actions]
python =
  3.12: py312, lint, type-checking, min_versions
  3.13: py313, check-packaging
  3.14: py314, docs

[testenv]
runner = virtualenv
extras = test
setenv =
    COVERAGE_FILE = {env:COVERAGE_FILE:.coverage-{envname}}
commands =
    pytest \
        --basetemp={envtmpdir} \
        --cov={[base]name} \
        --cov-branch \
        --cov-fail-under=100 \
        --no-cov-on-fail \
        --cov-report term-missing \
        --cov-report html:reports/coverage-{envname} \
        --cov-report xml:reports/coverage-{envname}.xml \
        --html reports/pytest-{envname}.html \
        --junit-xml=reports/pytest-{envname}.xml \
        --self-contained-html \
        --durations 10 \
        --durations-min=2.0 \
        {posargs}

[testenv:check-packaging]
skip_install = true
deps =
    build
    twine
commands =
    python -m build -o {envtmpdir}/dist
    twine check {envtmpdir}/dist/*

[testenv:min_versions]
basepython = python3.12
deps =
    uv
allowlist_externals = uv
commands_pre =
    uv pip compile \
        --resolution lowest-direct \
        --all-extras \
        --output-file {envtmpdir}/requirements_min.txt \
        pyproject.toml
    uv pip install -r {envtmpdir}/requirements_min.txt
    uv pip freeze

[testenv:lint]
basepython = python3.12
deps =
    pre-commit
commands =
    pre-commit run --all-files

[testenv:format]
basepython = python3.12
skip_install = true
deps =
    codespell
    pre-commit
commands =
    codespell -i 3 -x .codespellignorelines -w {[base]files}
    pre-commit run --all-files

[testenv:type-checking]
extras = test
deps =
    pyright
commands =
    pyright src tests

[testenv:docs]
changedir = docs
extras = docs
commands =
    sphinx-build \
        --fresh-env \
        --show-traceback \
        --fail-on-warning \
        --keep-going \
        . \
        build/html

[testenv:docs-autobuild]
changedir = docs
extras = docs
commands =
    sphinx-autobuild \
        --show-traceback \
        --watch \
        ../README.md \
        . \
        build/html

[testenv:linkcheck]
changedir = docs
extras = docs
commands =
    sphinx-build \
        --fresh-env \
        -b linkcheck \
        . \
        build/linkcheck
