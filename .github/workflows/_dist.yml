name: Build distribution

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist and wheel
        run: |
          uv venv .github/build-venv --python 3.12
          uv pip install --python .github/build-venv/bin/python build "setuptools>=77" "setuptools_scm[toml]>=8"
          .github/build-venv/bin/python -m build -o dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

      - name: Check the built distributions
        run: uvx twine check --strict dist/*

      - name: Install the produced wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-test the installed wheel
        run: python -m $(ls --hide='*.egg-info' src | head -1) --version
