name: Run tests

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        description: Python version to test with
        required: true
      runs-on:
        type: string
        description: Runner image to use
        default: ubuntu-latest

jobs:
  run:
    runs-on: ${{ inputs.runs-on }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Get current month
        id: date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Cache tox and pre-commit environments
        uses: actions/cache@v4
        with:
          path: |
            .tox
            ~/.cache/pre-commit
          key: ${{ runner.os }}-${{ inputs.python-version }}-${{ steps.date.outputs.date }}-${{ hashFiles('pyproject.toml') }}-${{ hashFiles('tox.ini') }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Clear results in tox environments
        run: rm -rf .tox/*/tmp

      - name: Run tox
        run: uv run --locked tox

      - name: JUnit Report Action
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: 'reports/pytest-*.xml'

      - name: Upload to codecov
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          directory: ./reports
          flags: pytest
          name: py${{ inputs.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tests-${{ inputs.runs-on }}-${{ inputs.python-version }}
          retention-days: 4
          path: |
            .tox/py*/tmp
            reports
