name: Build documentation

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Install graphviz
        run: sudo apt-get install -y graphviz

      - name: Build documentation
        run: uvx tox -e docs
