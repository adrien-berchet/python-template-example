name: Run tox environment

on:
  workflow_call:
    inputs:
      tox:
        type: string
        description: Tox environment(s) to run (comma-separated)
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - name: Run tox
        run: uv run --locked tox -e ${{ inputs.tox }}
